<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Job Application Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* custom colors and fine tuning to match the provided design */
    :root{--brand-blue:#083b6b;--muted:#64748b}
    .brand-blue{color:var(--brand-blue)}
    .bg-panel{background:linear-gradient(180deg,#ffffff,#fbfdff)}
    .card-outer{border-radius:12px;box-shadow:0 6px 22px rgba(3,7,18,0.06)}
    .tab-pill{padding:.45rem .9rem;border-radius:8px}
    .btn-outline-green{border:1px solid #16a34a}
    .btn-outline-red{border:1px solid #ef4444}
    .count-circle{font-size:1.125rem;font-weight:700}
  </style>
</head>
<body class="bg-white text-slate-800 font-sans antialiased">
  <div class="max-w-7xl mx-auto p-6">
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-4xl font-extrabold brand-blue">Job Application Tracker</h1>
    </header>

    <!-- Dashboard cards (three columns) -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white card-outer p-6 rounded-xl border">
        <div class="text-sm text-slate-500">Total</div>
        <div class="mt-4 text-4xl font-bold text-slate-900"> <span id="count-all-large">0</span></div>
      </div>

      <div class="bg-white card-outer p-6 rounded-xl border">
        <div class="text-sm text-slate-500">Interview</div>
        <div class="mt-4 text-4xl font-bold text-emerald-600"> <span id="count-interview-large">0</span></div>
      </div>

      <div class="bg-white card-outer p-6 rounded-xl border">
        <div class="text-sm text-slate-500">Rejected</div>
        <div class="mt-4 text-4xl font-bold text-red-500"> <span id="count-rejected-large">0</span></div>
      </div>
    </section>

    <!-- Available jobs header with tabs -->
    <section class="bg-white p-6 rounded-xl card-outer border">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-6">
          <div class="text-lg font-semibold">Available Jobs</div>
          <div class="flex bg-white border rounded-md p-1">
            <button data-tab="all" class="tab-pill tab-btn bg-blue-600 text-white text-sm font-medium">All</button>
            <button data-tab="interview" class="tab-pill tab-btn text-sm font-medium">Interview</button>
            <button data-tab="rejected" class="tab-pill tab-btn text-sm font-medium">Rejected</button>
          </div>
        </div>
        <div class="text-sm text-slate-500"><span id="header-job-count">0</span> jobs</div>
      </div>

      <!-- Jobs list -->
      <div id="jobs-list" class="space-y-6"></div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden py-12 text-center text-slate-500">
        <img src="./jobs.png" class="mx-auto h-20 w-20 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 8V7a2 2 0 0 0-2-2h-3V3H8v2H5a2 2 0 0 0-2 2v1"/><rect x="3" y="8" width="18" height="13" rx="2" ry="2"/>
        <h3 class="mt-4 text-lg font-semibold">No jobs available</h3>
        <p class="mt-2 text-sm text-slate-400">Check back soon for new opportunities</p>
      </div>
    </section>
  </div>
   <script src="./app.js"></script>
  </body>
</html>
